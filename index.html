<head>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg-base: #fefce8;
    --bg-pattern: #fde68a;
  }

  body {
    font-family: 'Jua', 'Fredoka', 'Noto Sans JP', 'Noto Sans SC', sans-serif;
    background-color: var(--bg-base);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(254, 215, 170, 0.4) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(187, 247, 208, 0.4) 0%, transparent 50%),
      radial-gradient(var(--bg-pattern) 1.5px, transparent 1.5px);
    background-size: 100% 100%, 100% 100%, 28px 28px;
    background-attachment: fixed;
    min-height: 100vh;
  }

  /* 언어별 폰트 자동 적용 */
  body.lang-ja { font-family: 'Noto Sans JP', 'Jua', sans-serif; }
  body.lang-zh { font-family: 'Noto Sans SC', 'Jua', sans-serif; }
  body.lang-en { font-family: 'Fredoka', 'Jua', sans-serif; }

  .game-card {
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform;
  }

  .game-card:hover {
    transform: translateY(-6px) scale(1.03);
    box-shadow: 0 25px 35px -10px rgba(0,0,0,0.18), 0 8px 15px -5px rgba(0,0,0,0.1);
  }

  .game-card:active {
    transform: translateY(-3px) scale(1.01);
  }

  .subject-tab {
    transition: all 0.25s ease;
  }

  .subject-tab.active {
    transform: scale(1.05);
  }

  /* Tab grow indicator (밑줄) */
  .subject-tab .tab-indicator {
    transform: scaleX(0);
    transition: transform 0.3s ease;
    transform-origin: center;
  }
  .subject-tab.active .tab-indicator {
    transform: scaleX(1);
  }

  /* 게임 카드 등장 애니메이션 */
  @keyframes pop-in {
    0% { opacity: 0; transform: translateY(20px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .game-card { animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }

  /* 스크롤 시 헤더 그림자 */
  .header-shadow { box-shadow: 0 4px 20px -8px rgba(0,0,0,0.1); }

  /* 언어 드롭다운 */
  .lang-dropdown {
    transform-origin: top right;
    transform: scale(0.95);
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s ease;
  }
  .lang-dropdown.open {
    transform: scale(1);
    opacity: 1;
    pointer-events: auto;
  }

  /* Coming soon 카드 */
  .coming-soon {
    background: repeating-linear-gradient(45deg, #f3f4f6, #f3f4f6 10px, #e5e7eb 10px, #e5e7eb 20px);
    color: #9ca3af;
  }

  /* 부드러운 페이드 */
  .fade-enter { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 모바일 터치 최적화 */
  @media (hover: none) {
    .game-card:hover { transform: none; }
    .game-card:active { transform: scale(0.97); }
  }

  /* 스크롤바 숨김 */
  .scroll-hide::-webkit-scrollbar { display: none; }
  .scroll-hide { scrollbar-width: none; }
</style>
</head>

    desc: { ko:'분수로 잡은 포켓몬 도감', en:'Pokédex from your fraction wins', ja:'分数で集めた図鑑',   zh:'分数收集图鉴' } },

  { id:'PIXEL', subject:'math', icon:'paintbrush', color:'from-pink-400 to-fuchsia-500',
    url: `${BASE_URL}/Pixel/Pixel.html`, status:'live',
    name: { ko:'픽셀 컬러링',      en:'Pixel Coloring',      ja:'ピクセル カラーリング', zh:'像素涂色' },
    desc: { ko:'잡은 포켓몬 픽셀 색칠하기', en:'Color your captured Pokémon', ja:'捕まえたポケモンを塗ろう', zh:'给捕获的精灵涂色' } },

  { id:'Sum10', subject:'math', icon:'plus-square', color:'from-red-400 to-pink-500',
    url: `${BASE_URL}/Sum10/Sum10.html`, status:'live',
    name: { ko:'사과 합 10',       en:'Apple Sum 10',        ja:'りんごで10',        zh:'苹果合10' },
    desc: { ko:'드래그로 합이 10이 되게!', en:'Drag to make sums of 10!', ja:'ドラッグで合計10に!',  zh:'拖拽合成10!' } },

  { id:'Poly', subject:'math', icon:'triangle', color:'from-emerald-400 to-green-500',
    url: `${BASE_URL}/Poly/Poly.html`, status:'live',
    name: { ko:'정다각형 진화',    en:'Polygon Evolution',   ja:'正多角形進化',       zh:'正多边形进化' },
    desc: { ko:'도형을 합쳐 진화시키기',  en:'Merge polygons to evolve', ja:'図形を合体して進化',   zh:'合成图形进化' } },

  /* ============== 과학 ============== */
  { id:'MudSurvivor', subject:'science', icon:'waves', color:'from-amber-500 to-yellow-600',
    url: `${BASE_URL}/MudSurvivor/MudSurvivor.html`, status:'live',
    name: { ko:'갯벌 서바이버',    en:'Mudflat Survivor',    ja:'干潟サバイバー',     zh:'滩涂幸存者' },
    desc: { ko:'갯벌 생태계 액션 게임',   en:'Mudflat ecosystem action!', ja:'干潟の生態系アクション!', zh:'滩涂生态系动作!' } },

  /* === 향후 추가 게임 (예시 - 필요 없으면 삭제) === */
  { id:'sci-soon-1', subject:'science', icon:'leaf', color:'from-green-400 to-emerald-500',
    url:'#', status:'soon',
    name: { ko:'식물 키우기',      en:'Plant Grower',        ja:'植物を育てる',       zh:'植物养成' },
    desc: { ko:'곧 만나요!',       en:'Coming soon!',        ja:'もうすぐ!',         zh:'敬请期待!' } },

  { id:'sci-soon-2', subject:'science', icon:'rocket', color:'from-indigo-400 to-blue-500',
    url:'#', status:'soon',

    desc: { ko:'곧 만나요!',       en:'Coming soon!',        ja:'もうすぐ!',         zh:'敬请期待!' } }

/* ============================================================
 *  상태 관리
 * ============================================================ */
const STORAGE_KEY = {
  LANG:    'platform_lang_v1',
  SUBJECT: 'platform_subject_v1'
};

let currentLang    = localStorage.getItem(STORAGE_KEY.LANG)    || 'ko';
let currentSubject = localStorage.getItem(STORAGE_KEY.SUBJECT) || 'english';

// 지원하지 않는 언어/과목 방어
if (!I18N[currentLang]) currentLang = 'ko';
if (!SUBJECTS.find(s => s.id === currentSubject)) currentSubject = 'english';

/* ============================================================
 *  i18n 헬퍼
 * ============================================================ */
function t(key) {
  // 'subjects.english.name' 같은 점 표기 지원
  return key.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : null, I18N[currentLang]) ?? key;
}

function tField(obj) {
  // {ko:'…', en:'…'} 같은 객체에서 현재 언어 텍스트 (없으면 ko로 폴백)
  if (typeof obj === 'string') return obj;
  return obj[currentLang] || obj.ko || Object.values(obj)[0] || '';
}

/* ============================================================
 *  렌더 함수
 * ============================================================ */
function renderHeader() {
  document.documentElement.lang = currentLang;
  document.body.className = `lang-${currentLang}`;
  document.getElementById('main-title').textContent    = t('title');
  document.getElementById('main-subtitle').textContent = t('subtitle');
  document.getElementById('footer-text').textContent   = t('footer');
  document.getElementById('subject-game-count-label').textContent = t('gamesUnit');
  document.getElementById('empty-title').textContent   = t('emptyTitle');
  document.getElementById('empty-desc').textContent    = t('emptyDesc');

  const langInfo = LANGS.find(l => l.code === currentLang);
  document.getElementById('lang-label').textContent = langInfo ? langInfo.label : 'KO';
}

function renderLangDropdown() {
  const dd = document.getElementById('lang-dropdown');
  dd.innerHTML = LANGS.map(l => `
    <button onclick="setLanguage('${l.code}')" class="w-full flex items-center gap-2 px-4 py-3 hover:bg-amber-50 transition-colors text-left ${l.code === currentLang ? 'bg-amber-50 font-bold' : ''}">
      <span class="text-lg">${l.flag}</span>
      <span class="text-sm text-amber-800">${l.label}</span>
      ${l.code === currentLang ? '<i data-lucide="check" class="w-4 h-4 ml-auto text-amber-600"></i>' : ''}
    </button>
  `).join('');
  lucide.createIcons();
}

function renderSubjectTabs() {
  const tabs = document.getElementById('subject-tabs');
  tabs.innerHTML = SUBJECTS.map(s => {
    const isActive = s.id === currentSubject;
    const count = GAMES.filter(g => g.subject === s.id).length;
    return `
      <button onclick="setSubject('${s.id}')" class="subject-tab ${isActive ? 'active' : ''} relative shrink-0 flex items-center gap-2 px-5 py-3 rounded-2xl border-2 transition-all
        ${isActive ? `${s.color.bg} ${s.color.text} border-current shadow-md` : 'bg-white border-gray-200 text-gray-500 hover:border-gray-300'}">
        <span class="text-xl">${s.emoji}</span>
        <span class="font-bold text-sm md:text-base">${t(`subjects.${s.id}.name`)}</span>
        <span class="text-xs px-2 py-0.5 rounded-full ${isActive ? 'bg-white/60' : 'bg-gray-100'}">${count}</span>
        <span class="tab-indicator absolute bottom-0 left-1/2 -translate-x-1/2 w-12 h-1 ${s.indicator} rounded-full"></span>
      </button>
    `;
  }).join('');
}

function renderSubjectHeader() {
  const s = SUBJECTS.find(x => x.id === currentSubject);
  if (!s) return;
  const headerEl = document.getElementById('subject-header');
  headerEl.className = `rounded-3xl p-5 md:p-6 transition-colors duration-500 fade-enter ${s.color.bg} ${s.color.text}`;
  // 페이드 다시 트리거
  headerEl.classList.remove('fade-enter');
  void headerEl.offsetWidth;
  headerEl.classList.add('fade-enter');

  document.getElementById('subject-icon-wrap').className =
    `w-14 h-14 md:w-16 md:h-16 rounded-2xl flex items-center justify-center text-3xl md:text-4xl shadow-md transition-colors ${s.color.iconBg}`;
  document.getElementById('subject-emoji').textContent = s.emoji;
  document.getElementById('subject-title').textContent = t(`subjects.${currentSubject}.name`);
  document.getElementById('subject-desc').textContent  = t(`subjects.${currentSubject}.desc`);

  const games = GAMES.filter(g => g.subject === currentSubject);
  document.getElementById('subject-game-count').textContent = games.length;
}

function renderGameGrid() {
  const grid  = document.getElementById('game-grid');
  const empty = document.getElementById('empty-state');
  const games = GAMES.filter(g => g.subject === currentSubject);

  if (games.length === 0) {
    grid.classList.add('hidden');
    empty.classList.remove('hidden');
    return;
  }
  grid.classList.remove('hidden');
  empty.classList.add('hidden');

  grid.innerHTML = games.map((g, i) => {
    const isSoon = g.status === 'soon';
    const cardBase = isSoon
      ? 'coming-soon'
      : `bg-gradient-to-br ${g.color} text-white`;
    const clickHandler = isSoon ? '' : `onclick="window.open('${g.url}', '_self')"`;
    const cursor = isSoon ? 'cursor-not-allowed' : 'cursor-pointer';

    return `
      <div ${clickHandler}
           class="game-card ${cardBase} ${cursor} relative rounded-2xl p-4 md:p-5 shadow-md overflow-hidden"
           style="animation-delay: ${i * 0.04}s">
        <div class="absolute -top-4 -right-4 w-20 h-20 rounded-full bg-white/15 blur-2xl"></div>
        <div class="absolute -bottom-3 -left-3 w-16 h-16 rounded-full bg-white/10 blur-xl"></div>

        <div class="relative z-10 flex flex-col items-center text-center min-h-[140px] md:min-h-[160px] justify-between">
          <div class="${isSoon ? 'bg-gray-300/50' : 'bg-white/25'} p-3 rounded-2xl mb-2 shadow-inner">
            <i data-lucide="${g.icon}" class="w-7 h-7 md:w-9 md:h-9 ${isSoon ? 'text-gray-500' : 'text-white drop-shadow-md'}"></i>
          </div>
          <div class="flex-1 flex flex-col justify-center">
            <h3 class="font-bold text-sm md:text-base leading-tight ${isSoon ? '' : 'drop-shadow-md'}">${tField(g.name)}</h3>
            <p class="text-[11px] md:text-xs mt-1 ${isSoon ? 'text-gray-500' : 'text-white/85'} leading-snug">${tField(g.desc)}</p>
          </div>
          ${isSoon ? `
            <div class="mt-2 px-2 py-0.5 rounded-full bg-gray-200 text-[10px] font-bold text-gray-600">${t('comingSoon')}</div>
          ` : ''}
        </div>
      </div>
    `;
  }).join('');

  lucide.createIcons();
}

/* ============================================================
 *  이벤트 핸들러
 * ============================================================ */
function setLanguage(code) {
  if (!I18N[code]) return;
  currentLang = code;
  localStorage.setItem(STORAGE_KEY.LANG, code);
  toggleLangDropdown(false);
  renderAll();
}

function setSubject(id) {
  if (!SUBJECTS.find(s => s.id === id)) return;
  currentSubject = id;
  localStorage.setItem(STORAGE_KEY.SUBJECT, id);
  renderSubjectTabs();
  renderSubjectHeader();
  renderGameGrid();
}

function toggleLangDropdown(forceState) {
  const dd = document.getElementById('lang-dropdown');
  if (forceState === false) { dd.classList.remove('open'); return; }
  if (forceState === true)  { dd.classList.add('open');    return; }
  dd.classList.toggle('open');
}

// 외부 클릭 시 드롭다운 닫기
document.addEventListener('click', (e) => {
  const btn = document.getElementById('lang-btn');
  const dd  = document.getElementById('lang-dropdown');
  if (!btn.contains(e.target) && !dd.contains(e.target)) {
    dd.classList.remove('open');
  }
});

// 스크롤 시 헤더 그림자
window.addEventListener('scroll', () => {
  const h = document.getElementById('main-header');
  if (window.scrollY > 10) h.classList.add('header-shadow');
  else                     h.classList.remove('header-shadow');
});

/* ============================================================
 *  전체 렌더 / 초기화
 * ============================================================ */
function renderAll() {
  renderHeader();
  renderLangDropdown();
  renderSubjectTabs();
  renderSubjectHeader();
  renderGameGrid();
  lucide.createIcons();
}

document.addEventListener('DOMContentLoaded', renderAll);
</script>
</body>
</html>
